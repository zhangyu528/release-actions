name: Call Reusable Pre-release (macOS)

on:
  workflow_dispatch:
    inputs:
      base_version:
        description: "Base version in vMAJOR.MINOR.PATCH format (example: v0.1.0)"
        required: true
        type: string
      channel:
        description: "Pre-release channel"
        required: true
        type: choice
        default: alpha
        options:
          - alpha
          - beta
          - rc

concurrency:
  group: prerelease-${{ inputs.channel }}-${{ inputs.base_version }}
  cancel-in-progress: false

jobs:
  guard-main:
    runs-on: ubuntu-latest
    steps:
      - name: Allow main only
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "This workflow can only run on main"
            exit 1
          fi

  prerelease:
    needs: guard-main
    uses: zhangyu528/release-actions/.github/workflows/pre-release-entry.yml@main
    with:
      platform: macos
      base_version: ${{ inputs.base_version }}
      channel: ${{ inputs.channel }}
      macos_workspace_path: Aiden.xcworkspace
      macos_project_path: ''
      macos_scheme: Aiden
      macos_runtime_helper_dir: scripts/runtime-deps
      macos_pkg_identifier: com.aiden.app
    secrets:
      repo_token: ${{ secrets.GITHUB_TOKEN }}
      apple_id: ${{ secrets.APPLE_ID }}
      apple_app_password: ${{ secrets.APPLE_APP_PASSWORD }}
