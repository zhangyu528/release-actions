name: Call Reusable Pre-release (Windows)

on:
  workflow_dispatch:
    inputs:
      base_version:
        description: "Base version in vMAJOR.MINOR.PATCH format (example: v0.1.0)"
        required: true
        type: string
      channel:
        description: "Pre-release channel"
        required: true
        type: choice
        default: alpha
        options:
          - alpha
          - beta
          - rc

concurrency:
  group: prerelease-${{ inputs.channel }}-${{ inputs.base_version }}
  cancel-in-progress: false

jobs:
  guard-main:
    runs-on: ubuntu-latest
    steps:
      - name: Allow main only
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "This workflow can only run on main"
            exit 1
          fi

  prerelease:
    needs: guard-main
    uses: zhangyu528/release-actions/.github/workflows/pre-release-entry.yml@main
    with:
      platform: windows
      base_version: ${{ inputs.base_version }}
      channel: ${{ inputs.channel }}
      dotnet_version: 8.0.x
      windows_rid: win-x64
      windows_solution_path: Aiden.sln
      windows_icon_source: Aiden.TrayMonitor/Assets/aiden.ico
      windows_helper_script_sources: |
        Aiden.RuntimeAgent/scripts/download-vm.ps1
        Aiden.RuntimeAgent/scripts/download-collector.ps1
      windows_postinstall_launch_exe: Aiden.TrayMonitor.exe
      windows_autorun_exe: Aiden.RuntimeAgent.exe
    secrets:
      github_token: ${{ secrets.GITHUB_TOKEN }}
      signpath_api_token: ${{ secrets.SIGNPATH_API_TOKEN }}
